name: chadshani-2

on:
  schedule:
    # 06:00 UTC = 08:00 Israel summer (IDT) / 09:00 winter (IST)
    - cron: '0 6 * * *'
  workflow_dispatch:   # triggered by Telegram bot or manually

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai yfinance requests

      - name: Generate latest.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python Shalev's_Projects/1_chadshani/generate_json.py

      - name: Commit and push
        run: |
          git config user.name "chadshani-bot"
          git config user.email "bot@chadshani"
          git add "Shalev's_Projects/1_chadshani/data/latest.json"
          git diff --cached --quiet && echo "no changes" || git commit -m "update $(date -u +'%Y-%m-%d %H:%M')"
          git push
