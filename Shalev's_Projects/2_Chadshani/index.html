<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשני — תחזוקה</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        .container { 
            background: #1e293b; 
            padding: 3rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
            max-width: 500px;
        }
        h1 { color: #e2e8f0; margin-bottom: 1rem; }
        p { color: #94a3b8; font-size: 1.1rem; line-height: 1.5; }
        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>חדשני כרגע תחת תחזוקה טכנית</h1>
        <div class="spinner"></div>
        <p>אנו מבצעים שדרוג מערכות, כיול נתונים, והטמעת מודלים מדויקים יותר לזמן אמת.<br>הדסק ישוב לפעילות מלאה ברגע שהתהליך יושלם בהצלחה.</p>
    </div>
</body>
</html>
