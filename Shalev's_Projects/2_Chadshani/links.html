<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>קישורים מקלוד קוד</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }
    header {
      text-align: center;
      margin-bottom: 32px;
      padding-top: 16px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 900;
      color: #0050d4;
      letter-spacing: -0.03em;
    }
    header p {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    @media (min-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      padding: 24px 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(0,80,212,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:active { transform: scale(0.97); }
    .badge {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #0050d4;
      background: rgba(0,80,212,0.08);
      padding: 3px 10px;
      border-radius: 999px;
      width: fit-content;
    }
    .card-name {
      font-size: 1.1rem;
      font-weight: 900;
      color: #1e293b;
      line-height: 1.2;
    }
    .card-url {
      font-size: 0.72rem;
      color: #64748b;
      font-weight: 700;
      word-break: break-all;
      direction: ltr;
      text-align: left;
    }
    .arrow {
      font-size: 1.4rem;
      color: #0050d4;
      margin-top: 4px;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.72rem;
      color: #94a3b8;
      font-weight: 700;
    }
    footer span { color: #0050d4; }
  </style>
</head>
<body>
  <header>
    <h1>קישורים מקלוד קוד</h1>
    <p id="ts">עודכן: טוען...</p>
  </header>

  <div class="grid" id="links-grid"></div>

  <footer>נבנה אוטומטית על ידי <span>Claude Code</span></footer>

  <script>
    const PROJECTS = [
      { name: "חדשני",          desc: "דסק מודיעין שוק יומי",        url: "https://shalevgigi-vks.github.io/Chadshani/",        badge: "LIVE" },
      { name: "אבולוציה",        desc: "Evolution Schematic",          url: "https://evolution-schematic.vercel.app",             badge: "LIVE" },
      { name: "LinkToText",     desc: "URL ל-Text Extractor",          url: "https://linktotext.vercel.app",                      badge: "LIVE" },
      { name: "LCL TCS",        desc: "TCS App — ממתין Firebase Auth", url: "https://lcl-4b863.web.app",                          badge: "PAUSED" },
    ];

    const grid = document.getElementById('links-grid');
    PROJECTS.forEach(p => {
      const a = document.createElement('a');
      a.href = p.url;
      a.className = 'card';
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <span class="badge">${p.badge}</span>
        <div class="card-name">${p.name}</div>
        <div style="font-size:0.8rem;color:#64748b;font-weight:600">${p.desc}</div>
        <div class="card-url">${p.url}</div>
        <div class="arrow">→</div>
      `;
      grid.appendChild(a);
    });

    document.getElementById('ts').textContent =
      'עודכן: ' + new Date().toLocaleDateString('he-IL') + ' ' + new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
  </script>
</body>
</html>
