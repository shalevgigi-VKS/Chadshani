<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>קסם הידיעה ✨</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FFF8EE;--yellow:#FFE566;--orange:#FF8C42;--teal:#4ECDC4;
      --purple:#C3B1E1;--pink:#FF6B9D;--green:#6BCB77;--blue:#6BA3E8;
      --dark:#2D2D2D;--mid:#777;--border:#E8DDD0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--cream);min-height:100vh;color:var(--dark)}

/* SCREENS */
.screen{display:none;min-height:100vh;padding:20px;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* INPUT SCREEN */
#s-input{justify-content:center;padding:40px 20px}
.logo{font-size:56px;text-align:center;animation:float 3s ease-in-out infinite;margin-bottom:8px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
h1{font-size:2.2rem;background:linear-gradient(135deg,var(--orange),var(--pink));
   -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px}
.subtitle{color:var(--mid);font-size:.9rem;text-align:center;margin-bottom:28px}
.card{background:#fff;border-radius:24px;padding:28px;width:100%;max-width:460px;
      box-shadow:0 4px 24px rgba(0,0,0,.08);border:2px solid var(--border)}
.field{margin-bottom:18px}
label{display:block;font-size:.78rem;font-weight:700;color:var(--mid);margin-bottom:7px;letter-spacing:.5px}
input[type=password],input[type=text]{width:100%;padding:14px 16px;border:2px solid var(--border);
  border-radius:14px;font-family:inherit;font-size:1rem;color:var(--dark);
  background:var(--cream);outline:none;transition:border-color .2s,box-shadow .2s;direction:rtl}
input:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(78,205,196,.15);background:#fff}
.hint{font-size:.73rem;color:#bbb;margin-top:5px}
.hint a{color:var(--teal)}
.err{background:#FFF0F0;border:2px solid #FFD0D0;border-radius:12px;padding:11px 15px;
     color:#CC3333;font-size:.83rem;margin-top:11px;display:none}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
     padding:14px;border:none;border-radius:14px;font-family:inherit;font-size:.95rem;
     font-weight:700;cursor:pointer;transition:transform .12s,box-shadow .12s;margin-bottom:10px}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-main{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;
          box-shadow:0 5px 16px rgba(255,107,157,.3)}
.btn-main:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 22px rgba(255,107,157,.42)}
.btn-teal{background:linear-gradient(135deg,var(--teal),#2DABA2);color:#fff;
          box-shadow:0 5px 16px rgba(78,205,196,.3)}
.btn-teal:hover:not(:disabled){transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--dark);border:2px solid var(--border);font-size:.88rem;padding:11px}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}

/* SCRIPT SCREEN */
#s-script{align-items:stretch;max-width:680px;margin:0 auto;padding:20px}
.back-btn{background:none;border:none;font-family:inherit;color:var(--mid);font-size:.83rem;
          cursor:pointer;margin-bottom:14px;display:flex;align-items:center;gap:5px;padding:4px 0}
.back-btn:hover{color:var(--orange)}
.ep-badge{display:inline-flex;align-items:center;gap:6px;
          background:linear-gradient(135deg,var(--yellow),var(--orange));
          color:#fff;padding:5px 15px;border-radius:100px;font-size:.78rem;font-weight:700;margin-bottom:10px}
.ep-title-h{font-size:1.35rem;font-weight:700;margin-bottom:14px}
.keymsg-box{background:linear-gradient(135deg,#F0F9FF,#E8F7F5);border:2px solid var(--teal);
            border-radius:14px;padding:13px 17px;display:flex;gap:12px;align-items:center;margin-bottom:18px}
.km-icon{font-size:1.4rem;flex-shrink:0}.km-lbl{font-size:.68rem;color:var(--teal);font-weight:700;letter-spacing:1px;margin-bottom:2px}
.km-text{font-size:.97rem;font-weight:700}
.scenes{margin-bottom:20px}
.sc-item{background:#fff;border:2px solid var(--border);border-radius:13px;padding:12px 15px;margin-bottom:9px}
.sc-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sc-who{font-size:.75rem;font-weight:700;color:var(--mid)}
.sc-dur{font-size:.7rem;color:#bbb;margin-right:auto}
.sc-lbl{font-size:.67rem;color:#bbb;margin-bottom:5px}
.sc-text{font-size:.9rem;line-height:1.75}
.action-box{background:#fff;border-radius:20px;padding:22px;border:2px solid var(--border)}
.action-lbl{font-size:.75rem;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:14px}

/* GENERATE SCREEN */
#s-record{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:16px;padding:16px;align-items:flex-start}
.canvas-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.18)}
#animCanvas{display:block;width:720px;height:405px}
.rec-bar{display:flex;align-items:center;gap:8px;background:#fff;border-radius:100px;
         padding:7px 16px;font-size:.82rem;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.rdot{width:11px;height:11px;border-radius:50%;background:#ddd}
.rdot.live{background:#FF3B30;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#genProgress{display:none;max-width:360px;width:100%;text-align:center}
.gen-bar-track{background:#E8DDD0;border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px}
#genBar{background:var(--orange);height:100%;border-radius:8px;width:0%;transition:width .5s}
#genLabel{font-size:.82rem;color:var(--mid)}
.script-col{flex:1;min-width:210px;max-width:260px}
.script-panel{background:#fff;border-radius:16px;border:2px solid var(--border);
              padding:16px;max-height:440px;overflow-y:auto}
.sp-title{font-size:.74rem;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:10px}
.ss-item{margin-bottom:11px;padding:10px;border-radius:11px;border:2px solid transparent;transition:all .3s}
.ss-item.active{border-color:var(--orange);background:#FFF8EE}
.ss-who{font-size:.7rem;font-weight:700;margin-bottom:3px}
.ss-text{font-size:.86rem;line-height:1.65}

/* DONE */
#s-done{justify-content:center;padding:40px 20px}
.done-icon{font-size:62px;text-align:center;margin-bottom:14px;animation:float 3s ease-in-out infinite}
.done-h{font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:7px}
.done-sub{color:var(--mid);text-align:center;margin-bottom:24px;font-size:.87rem}
#vidPrev{width:100%;max-width:480px;border-radius:12px;box-shadow:0 8px 22px rgba(0,0,0,.13);
         display:block;margin:0 auto 20px}
.done-card{background:#fff;border-radius:20px;padding:22px;border:2px solid var(--border);max-width:340px;width:100%}

/* RESPONSIVE */
@media(max-width:900px){
  #s-record{flex-direction:column;align-items:center}
  .script-col{width:100%;max-width:100%}
  #animCanvas{width:100%!important;height:auto!important}
}
</style>
</head>
<body>

<!-- SCREEN 1: INPUT -->
<div id="s-input" class="screen active">
  <div class="logo">✨</div>
  <h1>קסם הידיעה</h1>
  <p class="subtitle">הקלד נושא ← Claude כותב חרוזים ← יוצא סרטון</p>
  <div class="card">
    <div class="field">
      <label>🔑 מפתח API של Anthropic</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
      <p class="hint">לא נשמר בשום מקום &nbsp;·&nbsp; <a href="https://console.anthropic.com" target="_blank">קבל מפתח ←</a></p>
    </div>
    <div class="field">
      <label>🎯 נושא הפרק (בעברית)</label>
      <input type="text" id="topicInput" placeholder="לדוגמה: צחצוח שיניים, רחיצת ידיים..." maxlength="60">
    </div>
    <button class="btn btn-main" id="genBtn" onclick="onGenerate()">✨ צור סרטון</button>
    <div class="err" id="errBox"></div>
  </div>
</div>

<!-- SCREEN 2: SCRIPT REVIEW -->
<div id="s-script" class="screen">
  <div style="width:100%;max-width:680px">
    <button class="back-btn" onclick="go('s-input')">← חזרה</button>
    <div class="ep-badge" id="epBadge">✨</div>
    <div class="ep-title-h" id="epTitleH"></div>
    <div class="keymsg-box">
      <div class="km-icon">💬</div>
      <div><div class="km-lbl">המסר המרכזי</div><div class="km-text" id="kmText"></div></div>
    </div>
    <div class="scenes" id="scenesList"></div>
    <div class="action-box">
      <div class="action-lbl">🎬 מוכן? לחץ ויצא סרטון!</div>
      <button class="btn btn-main" onclick="generateVideo()">🎬 צור סרטון אוטומטי</button>
      <button class="btn btn-ghost" onclick="startPreview()">▶️ תצוגה מקדימה עם קול</button>
    </div>
  </div>
</div>

<!-- SCREEN 3: GENERATE -->
<div id="s-record" class="screen">
  <div class="canvas-col">
    <div class="canvas-wrap">
      <canvas id="animCanvas" width="1280" height="720"></canvas>
    </div>
    <div class="rec-bar">
      <div class="rdot" id="rdot"></div>
      <span id="recStatus">מכין...</span>
    </div>
    <div id="genProgress">
      <div class="gen-bar-track"><div id="genBar"></div></div>
      <div id="genLabel">מייצר...</div>
    </div>
    <button class="btn btn-ghost" id="cancelBtn" style="max-width:180px;font-size:.82rem;padding:9px;display:none" onclick="onCancel()">✕ ביטול</button>
  </div>
  <div class="script-col">
    <div class="script-panel">
      <div class="sp-title">📖 תסריט:</div>
      <div id="scriptDisp"></div>
    </div>
  </div>
</div>

<!-- SCREEN 4: DONE -->
<div id="s-done" class="screen">
  <div class="done-icon">🎉</div>
  <div class="done-h">הסרטון מוכן!</div>
  <div class="done-sub">הורד ועלה ליוטיוב — 1280×720 (16:9)</div>
  <video id="vidPrev" controls playsinline></video>
  <div class="done-card">
    <button class="btn btn-main" id="dlBtn" style="margin-bottom:10px">⬇️ הורד WebM</button>
    <button class="btn btn-ghost" onclick="go('s-input')">✨ פרק חדש</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const CW = 1280, CH = 720
const ACT_COLORS = ['#FF8C42','#4ECDC4','#87CEEB','#C3B1E1','#6BCB77']
const ACT_LABELS  = ['מערכה 1 — שאלה','מערכה 2','מערכה 2 — המשך','מסר מרכזי','מערכה 3 — פעולה']

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const cv  = document.getElementById('animCanvas')
const ctx = cv.getContext('2d')
let ep = null, apiKey = ''
let animOn = false, rafId = null, animStart = 0
let scTimings = [], curScIdx = -1
let mrec = null, chunks = [], audioCtx = null, musicHandle = null, recordDest = null
let playMode = '' // 'preview' | 'recording'
let childVoice = null, bearVoice = null, voicesOk = false
let confettiParticles = []

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function cleanup() {
  playMode = ''
  if(typeof speechSynthesis !== 'undefined') speechSynthesis.cancel()
  animOn = false
  if(rafId) { cancelAnimationFrame(rafId); rafId = null }
  if(mrec && mrec.state === 'recording') {
    mrec.ondataavailable = null; mrec.onstop = null; mrec.stop()
  }
  mrec = null; chunks = []
  stopMusic()
  if(audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null }
  document.getElementById('rdot').className = 'rdot'
  document.getElementById('genProgress').style.display = 'none'
  document.getElementById('cancelBtn').style.display = 'none'
  confettiParticles = []
}

function go(id) {
  cleanup()
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  window.scrollTo(0,0)
}

// ═══════════════════════════════════════════
// SCREEN 1: GENERATE SCRIPT VIA CLAUDE
// ═══════════════════════════════════════════
async function onGenerate() {
  const key   = document.getElementById('apiKey').value.trim()
  const topic = document.getElementById('topicInput').value.trim()
  const err   = document.getElementById('errBox')
  err.style.display = 'none'
  if(!key)   return showErr('יש להזין מפתח API')
  if(!topic) return showErr('יש לכתוב נושא')
  apiKey = key

  const btn = document.getElementById('genBtn')
  btn.disabled = true; btn.textContent = '⏳ כותב חרוזים...'

  const sys = `אתה כותב תסריטים לסדרת ילדים "קסם הידיעה" לגילאי 4-7.
דמויות: דני (ילד/ה בן 6, סקרן/ית) וצ'יקו הדוב (דוב חכם ועדין).
חוקים:
- עברית מדוברת פשוטה בלבד
- כל הפרק בחרוזים AABB (כל זוג שורות מתחרז)
- בכל סצינה בדיוק 2 שורות, כל שורה מקסימום 8 מילים
- מילות סיום מתחרזות
- ללא תוכן מפחיד, חיובי בלבד
- מסר מרכזי: משפט אחד, 8 מילים מקסימום
סצינות: 5 סצינות, סה"כ 30-45 שניות.
1 (act:1, speaker:דני, duration:7): שאלה — דני שואל למה צריך [נושא]
2 (act:2, speaker:צ'יקו, duration:10): סיבה ראשונה בחרוזים
3 (act:2, speaker:צ'יקו, duration:10): סיבה שנייה בחרוזים
4 (act:2, isKeyMessage:true, duration:7): מסר מרכזי — שורה אחת בלבד
5 (act:3, speaker:דני, duration:7): דני מבצע את ההרגל בשמחה

החזר JSON בלבד, ללא טקסט אחר:
{"title":"קסם הידיעה — X","keyMessage":"X","emoji":"X","color":"#RRGGBB","scenes":[{"id":1,"act":1,"speaker":"דני","speakerType":"child","lines":["שורה1","שורה2"],"mood":"curious","duration":7},{"id":2,"act":2,"speaker":"צ'יקו","speakerType":"bear","lines":["שורה1","שורה2"],"mood":"happy","duration":10},{"id":3,"act":2,"speaker":"צ'יקו","speakerType":"bear","lines":["שורה1","שורה2"],"mood":"happy","duration":10},{"id":4,"act":2,"isKeyMessage":true,"lines":["מסר"],"mood":"excited","duration":7},{"id":5,"act":3,"speaker":"דני","speakerType":"child","lines":["שורה1","שורה2"],"mood":"excited","duration":7}]}`

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        system: sys,
        messages: [{role:'user', content:'נושא: ' + topic}]
      })
    })
    if(!r.ok) {
      const e = await r.json().catch(()=>({}))
      throw new Error(r.status===401 ? 'מפתח API שגוי' : (e?.error?.message || 'שגיאה ' + r.status))
    }
    const d = await r.json()
    const raw = (d.content?.[0]?.text || '{}').replace(/```json\n?|```/g,'').trim()
    ep = JSON.parse(raw)
    if(!ep?.scenes?.length) throw new Error('תגובה לא תקינה מ-Claude')
    renderScript()
    go('s-script')
  } catch(e) { showErr(e.message) }
  finally { btn.disabled = false; btn.textContent = '✨ צור סרטון' }
}

function showErr(m) {
  const b = document.getElementById('errBox')
  b.textContent = '⚠️ ' + m
  b.style.display = 'block'
}

// ═══════════════════════════════════════════
// SCRIPT SCREEN
// ═══════════════════════════════════════════
function renderScript() {
  document.getElementById('epBadge').innerHTML = (ep.emoji||'✨') + ' ' + (ep.title||'').replace('קסם הידיעה — ','')
  document.getElementById('epTitleH').textContent = ep.title || ''
  document.getElementById('kmText').textContent = ep.keyMessage || ''
  const list = document.getElementById('scenesList')
  list.innerHTML = ''
  ep.scenes.forEach((sc,i) => {
    const d = document.createElement('div')
    d.className = 'sc-item'
    d.innerHTML = `
      <div class="sc-meta">
        <div class="sc-dot" style="background:${ACT_COLORS[i]||'#888'}"></div>
        <span class="sc-who">${sc.speakerType==='child'?'👦':'sc.speakerType==="bear"?🐻:✨'} ${sc.speaker||'מסר'}</span>
        <span class="sc-dur">${sc.duration} שנ'</span>
      </div>
      <div class="sc-lbl">${ACT_LABELS[i]||''}</div>
      <div class="sc-text">${(sc.lines||[]).join('<br>')}</div>`
    list.appendChild(d)
  })
}

// ═══════════════════════════════════════════
// CHARACTER DRAWING — דני (ילד)
// ═══════════════════════════════════════════
function drawDanny(x, y, scale, mood, bounce) {
  const H = 42 * scale // head radius
  const by = y + bounce

  // Hair (dark, top arc)
  ctx.fillStyle = '#3D2B1F'
  ctx.beginPath()
  ctx.arc(x, by - H*0.5, H*0.9, Math.PI+0.15, -0.15)
  ctx.fill()

  // Head
  ctx.fillStyle = '#FFD5A8'
  ctx.beginPath(); ctx.arc(x, by, H, 0, Math.PI*2); ctx.fill()

  // Cheeks
  ctx.globalAlpha = 0.32; ctx.fillStyle = '#FF9999'
  ctx.beginPath(); ctx.arc(x - H*0.58, by + H*0.22, H*0.2, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(x + H*0.58, by + H*0.22, H*0.2, 0, Math.PI*2); ctx.fill()
  ctx.globalAlpha = 1

  // Eyes
  const eyeRx = [x - H*0.34, x + H*0.34], eyeY = by - H*0.18
  eyeRx.forEach((ex,i) => {
    ctx.fillStyle = '#fff'
    ctx.beginPath(); ctx.arc(ex, eyeY, H*0.18, 0, Math.PI*2); ctx.fill()
    const pupilOff = (mood==='curious') ? -H*0.04 : 0
    ctx.fillStyle = '#2D2D2D'
    ctx.beginPath(); ctx.arc(ex + (i===0?-1:1)*H*0.04, eyeY + pupilOff + H*0.04, H*0.09, 0, Math.PI*2); ctx.fill()
    ctx.fillStyle = '#fff'
    ctx.beginPath(); ctx.arc(ex + (i===0?-1:1)*H*0.07, eyeY + pupilOff, H*0.04, 0, Math.PI*2); ctx.fill()
  })

  // Eyebrows
  ctx.strokeStyle = '#3D2B1F'; ctx.lineWidth = H*0.08; ctx.lineCap='round'
  const browY = by - H*0.42
  if(mood === 'curious') {
    ctx.beginPath(); ctx.moveTo(x-H*0.48, browY); ctx.lineTo(x-H*0.2, browY-H*0.1); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(x+H*0.2, browY-H*0.1); ctx.lineTo(x+H*0.48, browY+H*0.05); ctx.stroke()
  } else {
    eyeRx.forEach(ex => {
      ctx.beginPath(); ctx.moveTo(ex-H*0.17, browY); ctx.lineTo(ex+H*0.17, browY); ctx.stroke()
    })
  }

  // Mouth
  ctx.strokeStyle = '#C07040'; ctx.lineWidth = H*0.09; ctx.lineCap='round'
  ctx.beginPath()
  if(mood==='happy'||mood==='excited') {
    ctx.arc(x, by + H*0.15, H*0.28, 0.1, Math.PI-0.1)
  } else {
    ctx.arc(x, by + H*0.22, H*0.16, 0.2, Math.PI-0.2)
  }
  ctx.stroke()
  if(mood==='excited') {
    // Small teeth
    ctx.fillStyle = '#fff'
    ctx.fillRect(x - H*0.16, by + H*0.15, H*0.32, H*0.09)
  }

  // Neck
  ctx.fillStyle = '#FFD5A8'
  ctx.fillRect(x - H*0.18, by + H*0.88, H*0.36, H*0.3)

  // Body (blue t-shirt)
  const bw = H*0.85, bh = H*1.15, bdy = by + H + H*0.2
  ctx.fillStyle = '#6BA3E8'
  ctx.beginPath(); ctx.roundRect(x - bw, bdy, bw*2, bh, H*0.18); ctx.fill()

  // White collar V
  ctx.fillStyle = '#E0EEFF'
  ctx.beginPath(); ctx.moveTo(x - H*0.28, bdy); ctx.lineTo(x, bdy+H*0.35); ctx.lineTo(x + H*0.28, bdy); ctx.fill()

  // Arms
  const aY = bdy + bh*0.18, aH = H*0.42
  ctx.fillStyle = '#6BA3E8'
  ctx.beginPath(); ctx.roundRect(x - bw*1.75, aY, bw*0.82, aH, H*0.1); ctx.fill()
  ctx.beginPath(); ctx.roundRect(x + bw*0.93, aY, bw*0.82, aH, H*0.1); ctx.fill()
  // Hands
  ctx.fillStyle = '#FFD5A8'
  ctx.beginPath(); ctx.arc(x - bw*1.34, aY + aH*0.5, H*0.19, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(x + bw*1.34, aY + aH*0.5, H*0.19, 0, Math.PI*2); ctx.fill()

  // Pants
  const pY = bdy + bh*0.82, pW = bw*0.44, pH = H*0.72
  ctx.fillStyle = '#4A6FA5'
  ctx.beginPath(); ctx.roundRect(x - bw*0.04 - pW, pY, pW, pH, H*0.08); ctx.fill()
  ctx.beginPath(); ctx.roundRect(x + bw*0.04, pY, pW, pH, H*0.08); ctx.fill()

  // Shoes
  const sY = pY + pH - H*0.05
  ctx.fillStyle = '#5C3A1E'
  ctx.beginPath(); ctx.ellipse(x - bw*0.3, sY, H*0.28, H*0.11, -0.1, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.ellipse(x + bw*0.3, sY, H*0.28, H*0.11, 0.1, 0, Math.PI*2); ctx.fill()
}

// ═══════════════════════════════════════════
// CHARACTER DRAWING — צ'יקו (דוב)
// ═══════════════════════════════════════════
function drawChico(x, y, scale, mood, bounce) {
  const H = 48 * scale // head radius (bear = bigger)
  const by = y + bounce

  // Ears (behind head)
  ctx.fillStyle = '#7A4E2A'
  ctx.beginPath(); ctx.arc(x - H*0.72, by - H*0.7, H*0.28, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(x + H*0.72, by - H*0.7, H*0.28, 0, Math.PI*2); ctx.fill()
  ctx.fillStyle = '#C4836A'
  ctx.beginPath(); ctx.arc(x - H*0.72, by - H*0.7, H*0.15, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(x + H*0.72, by - H*0.7, H*0.15, 0, Math.PI*2); ctx.fill()

  // Head
  ctx.fillStyle = '#A0723A'
  ctx.beginPath(); ctx.arc(x, by, H, 0, Math.PI*2); ctx.fill()

  // Snout (lighter muzzle)
  ctx.fillStyle = '#C4956A'
  ctx.beginPath(); ctx.ellipse(x, by + H*0.2, H*0.42, H*0.32, 0, 0, Math.PI*2); ctx.fill()

  // Eyes
  const eyeRx2 = [x - H*0.3, x + H*0.3], eyeY2 = by - H*0.22
  eyeRx2.forEach((ex,i) => {
    ctx.fillStyle = '#2D1A0A'
    ctx.beginPath(); ctx.arc(ex, eyeY2, H*0.12, 0, Math.PI*2); ctx.fill()
    ctx.fillStyle = '#fff'
    ctx.beginPath(); ctx.arc(ex + (i===0?-1:1)*H*0.04, eyeY2 - H*0.04, H*0.045, 0, Math.PI*2); ctx.fill()
  })

  // Eyebrows
  ctx.strokeStyle = '#5A3010'; ctx.lineWidth = H*0.08; ctx.lineCap='round'
  const browY2 = by - H*0.4
  eyeRx2.forEach((ex,i) => {
    ctx.beginPath(); ctx.moveTo(ex-H*0.17, browY2); ctx.lineTo(ex+H*0.17, browY2-H*0.04); ctx.stroke()
  })

  // Nose
  ctx.fillStyle = '#2D1A0A'
  ctx.beginPath(); ctx.ellipse(x, by + H*0.06, H*0.13, H*0.09, 0, 0, Math.PI*2); ctx.fill()

  // Mouth
  ctx.strokeStyle = '#7A4E2A'; ctx.lineWidth = H*0.08; ctx.lineCap='round'
  ctx.beginPath()
  if(mood==='happy'||mood==='excited') {
    ctx.moveTo(x - H*0.18, by + H*0.25)
    ctx.quadraticCurveTo(x, by + H*0.45, x + H*0.18, by + H*0.25)
  } else {
    ctx.moveTo(x - H*0.15, by + H*0.32); ctx.lineTo(x + H*0.15, by + H*0.32)
  }
  ctx.stroke()

  // Neck
  ctx.fillStyle = '#A0723A'; ctx.fillRect(x - H*0.2, by + H*0.88, H*0.4, H*0.25)

  // Body
  const bw = H*1.0, bh = H*1.35, bdy = by + H + H*0.15
  ctx.fillStyle = '#8B5E3C'
  ctx.beginPath(); ctx.roundRect(x - bw, bdy, bw*2, bh, H*0.22); ctx.fill()
  // Belly
  ctx.fillStyle = '#C4956A'
  ctx.beginPath(); ctx.ellipse(x, bdy + bh*0.48, bw*0.58, bh*0.42, 0, 0, Math.PI*2); ctx.fill()

  // Arms (short, rounded)
  const aY2 = bdy + bh*0.1, aH2 = H*0.5
  ctx.fillStyle = '#7A4E2A'
  ctx.beginPath(); ctx.roundRect(x - bw*1.82, aY2, bw*0.88, aH2, H*0.12); ctx.fill()
  ctx.beginPath(); ctx.roundRect(x + bw*0.94, aY2, bw*0.88, aH2, H*0.12); ctx.fill()
  // Paws
  ctx.fillStyle = '#C4956A'
  ctx.beginPath(); ctx.arc(x - bw*1.38, aY2 + aH2*0.5, H*0.24, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(x + bw*1.38, aY2 + aH2*0.5, H*0.24, 0, Math.PI*2); ctx.fill()

  // Legs
  const lW = bw*0.42, lH = H*0.62, lY = bdy + bh*0.82
  ctx.fillStyle = '#7A4E2A'
  ctx.beginPath(); ctx.roundRect(x - bw*0.58, lY, lW, lH, H*0.1); ctx.fill()
  ctx.beginPath(); ctx.roundRect(x + bw*0.16, lY, lW, lH, H*0.1); ctx.fill()
  // Feet
  ctx.fillStyle = '#C4956A'
  ctx.beginPath(); ctx.ellipse(x - bw*0.37, lY+lH-H*0.05, H*0.26, H*0.12, 0, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.ellipse(x + bw*0.37, lY+lH-H*0.05, H*0.26, H*0.12, 0, 0, Math.PI*2); ctx.fill()
}

// ═══════════════════════════════════════════
// BACKGROUNDS
// ═══════════════════════════════════════════
function drawRoomBg() {
  // Wall
  ctx.fillStyle = '#FFF3D4'; ctx.fillRect(0, 0, CW, CH*0.68)
  // Floor
  const floorY = CH*0.68
  ctx.fillStyle = '#D4A574'; ctx.fillRect(0, floorY, CW, CH - floorY)
  // Wood planks
  ctx.strokeStyle = '#B8804A'; ctx.lineWidth = 1.5
  for(let fy = floorY; fy < CH; fy += 40) {
    ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(CW, fy); ctx.stroke()
  }
  for(let fx = 0; fx < CW; fx += 200) {
    ctx.beginPath(); ctx.moveTo(fx, floorY); ctx.lineTo(fx, CH); ctx.stroke()
  }
  // Baseboard
  ctx.fillStyle = '#EEE8D5'; ctx.fillRect(0, floorY-22, CW, 22)
  ctx.strokeStyle = '#DDD5C0'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(0, floorY-22); ctx.lineTo(CW, floorY-22); ctx.stroke()
}

function drawStarsBg() {
  // Dark gradient
  const g = ctx.createLinearGradient(0,0,0,CH)
  g.addColorStop(0, '#0A0A3A'); g.addColorStop(1, '#16166A')
  ctx.fillStyle = g; ctx.fillRect(0, 0, CW, CH)
}

function drawColorBg(color) {
  const [r,b2,b] = [parseInt(color.slice(1,3),16), parseInt(color.slice(3,5),16), parseInt(color.slice(5,7),16)]
  ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,CW,CH)
  ctx.fillStyle = `rgba(${r},${b2},${b},0.07)`; ctx.fillRect(0,0,CW,CH)
}

// ═══════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════
function initConfetti() {
  if(confettiParticles.length) return
  const cols = ['#FF6B9D','#FFE566','#4ECDC4','#C3B1E1','#FF8C42','#6BCB77']
  for(let i=0; i<60; i++) {
    confettiParticles.push({
      x:Math.random()*CW, y:-30-Math.random()*200,
      vy:1.8+Math.random()*2.5, vx:(Math.random()-0.5)*2.5,
      color:cols[Math.floor(Math.random()*cols.length)],
      w:8+Math.random()*9, h:5+Math.random()*5,
      rot:Math.random()*Math.PI*2, vrot:(Math.random()-0.5)*0.18
    })
  }
}

function drawConfetti() {
  confettiParticles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot
    if(p.y>CH+20){p.y=-20;p.x=Math.random()*CW}
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot)
    ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h)
    ctx.restore()
  })
}

// ═══════════════════════════════════════════
// SCENE DRAWING
// ═══════════════════════════════════════════
function wrapText(text, maxW, fs) {
  ctx.font = 'bold ' + fs + 'px "Segoe UI",Arial,sans-serif'
  ctx.direction = 'rtl'
  const words = text.split(' '), lines = []; let line=''
  for(const w of words) {
    const test = line ? line+' '+w : w
    if(ctx.measureText(test).width > maxW && line) { lines.push(line); line=w }
    else line=test
  }
  if(line) lines.push(line)
  return lines.length ? lines : [text]
}

function rrFill(x,y,w,h,r) {
  if(w<=0) return
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r)
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill()
}

function drawScene(scIdx, prog, ts) {
  const scene = ep?.scenes?.[scIdx]; if(!scene) return
  const color = ep.color || '#FF8C42'
  const dur = scene.duration * 1000, elapsed = prog * dur
  let alpha = 1
  if(elapsed < 300) alpha = elapsed/300
  if(elapsed > dur-250) alpha = Math.max(0, (dur-elapsed)/250)
  ctx.globalAlpha = alpha

  // — BACKGROUND —
  if(scene.isKeyMessage) {
    drawStarsBg()
    // Animated stars
    [[110,65],[320,130],[600,55],[820,120],[1060,68],[200,370],[960,295],[1160,185],[510,410],[720,320]].forEach(([sx,sy],i) => {
      const s2 = 0.7 + Math.sin(ts/420+i*0.9)*0.28
      ctx.font = (14+i%5*3)*s2 + 'px serif'
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.direction='ltr'
      ctx.globalAlpha = alpha * (0.55+Math.sin(ts/350+i)*0.35)
      ctx.fillText('⭐', sx, sy)
    })
    ctx.globalAlpha = alpha
  } else if(scene.act === 1) {
    drawRoomBg()
  } else if(scene.act === 3) {
    drawRoomBg()
    drawConfetti()
  } else {
    drawColorBg(color)
    // Decorative dots
    ctx.globalAlpha = alpha * 0.12
    const [r2,g2,b2] = [parseInt(color.slice(1,3),16),parseInt(color.slice(3,5),16),parseInt(color.slice(5,7),16)]
    ctx.fillStyle = color
    [[0.05,0.1,60],[0.95,0.18,42],[0.88,0.84,70],[0.12,0.85,50]].forEach(([x,y,rad]) => {
      ctx.beginPath(); ctx.arc(x*CW,y*CH,rad,0,Math.PI*2); ctx.fill()
    })
    ctx.globalAlpha = alpha
  }

  const bounce = Math.sin(ts/580) * 10

  if(scene.isKeyMessage) {
    // Big animated emoji
    const pulse = 100 + Math.sin(ts/500)*10
    ctx.font = pulse + 'px serif'
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.direction='ltr'
    ctx.fillText('✨', CW/2, CH*0.28)

    // Key message text
    const fs = 62
    const lines = wrapText(scene.lines?.[0] || ep.keyMessage, CW-140, fs)
    ctx.font = 'bold ' + fs + 'px "Segoe UI",Arial,sans-serif'
    ctx.direction='rtl'; ctx.textAlign='center'
    ctx.shadowColor='#FFB800'; ctx.shadowBlur=32; ctx.fillStyle='#FFE566'
    lines.forEach((l,i) => ctx.fillText(l, CW/2, CH*0.52 + i*80))
    ctx.shadowBlur=0
    ctx.font = '22px "Segoe UI",Arial,sans-serif'
    ctx.fillStyle='rgba(255,255,255,0.4)'
    ctx.fillText('המסר המרכזי', CW/2, CH*0.52 + lines.length*80 + 36)

  } else {
    // Characters
    const isChild = scene.speakerType === 'child'
    const mood = scene.mood || 'happy'

    if(scene.speakerType === 'child') {
      // Danny is main (left), Chico is companion (right)
      drawDanny(390, 340, 2.0, mood, bounce)
      drawChico(940, 355, 1.35, 'happy', 0)
    } else if(scene.speakerType === 'bear') {
      // Chico is main (right), Danny is companion (left)
      drawDanny(310, 365, 1.35, 'happy', 0)
      drawChico(870, 330, 2.1, mood, bounce)
    }

    // Speaker glow ring
    const gCx = isChild ? 390 : 870, gCy = (isChild ? 340 : 330) + bounce
    const gR  = isChild ? 85 : 100
    ctx.save()
    ctx.beginPath(); ctx.arc(gCx, gCy, gR+20, 0, Math.PI*2)
    ctx.strokeStyle = color; ctx.lineWidth = 5
    ctx.globalAlpha = alpha * (0.25 + Math.sin(ts/400)*0.12); ctx.stroke()
    ctx.restore()

    // Speaker name tag
    if(scene.speaker) {
      const tx = CW/2, ty = CH*0.72
      ctx.save()
      ctx.fillStyle = color; ctx.globalAlpha = alpha*0.95
      rrFill(tx - 100, ty-22, 200, 40, 20)
      ctx.globalAlpha = alpha
      ctx.font = 'bold 24px "Segoe UI",Arial,sans-serif'
      ctx.direction='rtl'; ctx.textAlign='center'
      ctx.fillStyle = '#fff'
      ctx.fillText(scene.speaker + ':', tx, ty+5)
      ctx.restore()
    }

    // Dialogue text
    const lines2 = scene.lines || []
    const fs2 = lines2.length > 1 ? 38 : 44
    const lh2 = fs2 + 16
    const textY = CH * 0.785

    // Text background bubble
    ctx.save()
    ctx.fillStyle = 'rgba(255,255,255,0.88)'
    const maxW2 = CW - 120
    const allWrapped = lines2.map(l => wrapText(l, maxW2, fs2)).flat()
    const totalH = allWrapped.length * lh2 + 24
    rrFill(CW/2 - maxW2/2 - 20, textY - lh2 + 4, maxW2 + 40, totalH, 18)
    ctx.restore()

    ctx.font = 'bold ' + fs2 + 'px "Segoe UI",Arial,sans-serif'
    ctx.direction='rtl'; ctx.textAlign='center'; ctx.fillStyle = '#2D2D2D'
    let lineIdx = 0
    lines2.forEach(line => {
      const wrapped = wrapText(line, maxW2, fs2)
      wrapped.forEach(wl => {
        ctx.fillText(wl, CW/2, textY + lineIdx * lh2)
        lineIdx++
      })
    })
  }

  // Watermark
  ctx.save()
  ctx.font = 'bold 22px "Segoe UI",Arial,sans-serif'
  ctx.direction='rtl'; ctx.textAlign='right'
  ctx.fillStyle = scene.isKeyMessage ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.2)'
  ctx.fillText('קסם הידיעה ✨', CW-26, 40)
  ctx.font = '20px serif'; ctx.direction='ltr'; ctx.textAlign='left'
  ctx.fillText(ep.emoji||'✨', 44, 38)
  ctx.restore()

  // Progress bar
  const total  = ep.scenes.reduce((s,x)=>s+x.duration, 0)
  const prev   = ep.scenes.slice(0,scIdx).reduce((s,x)=>s+x.duration, 0)
  const gp     = (prev + prog * scene.duration) / total
  const bx=50, by2=CH-36, bw=CW-100, bh=11, br=6
  ctx.save()
  ctx.fillStyle = scene.isKeyMessage ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.10)'
  rrFill(bx, by2, bw, bh, br)
  ctx.fillStyle = scene.isKeyMessage ? '#FFE566' : color
  rrFill(bx, by2, Math.max(br*2, bw*gp), bh, br)
  const rem = Math.max(0, total - prev - prog * scene.duration)
  ctx.font='18px "Segoe UI",Arial,sans-serif'; ctx.direction='ltr'; ctx.textAlign='center'
  ctx.fillStyle = scene.isKeyMessage ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)'
  ctx.fillText(Math.ceil(rem)+'s', CW/2, CH-11)
  ctx.restore()

  ctx.globalAlpha = 1
}

// ═══════════════════════════════════════════
// SCRIPT PANEL
// ═══════════════════════════════════════════
function buildScriptPanel() {
  const p = document.getElementById('scriptDisp'); p.innerHTML=''
  ep.scenes.forEach((sc,i) => {
    const d = document.createElement('div')
    d.className='ss-item'; d.id='ss'+i
    const icon = sc.speakerType==='child'?'👦':sc.speakerType==='bear'?'🐻':'✨'
    d.innerHTML=`<div class="ss-who" style="color:${ACT_COLORS[i]}">${icon} ${sc.speaker||'מסר'} — ${sc.duration}שנ'</div><div class="ss-text">${(sc.lines||[]).join('<br>')}</div>`
    p.appendChild(d)
  })
}

function highlightScene(idx) {
  document.querySelectorAll('.ss-item').forEach(e=>e.classList.remove('active'))
  const el = document.getElementById('ss'+idx)
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'})}
  curScIdx = idx
}

function buildTimings() {
  scTimings=[]; let t=0
  ep.scenes.forEach(sc=>{scTimings.push({s:t*1000,e:(t+sc.duration)*1000});t+=sc.duration})
}

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════
function animLoop(ts) {
  if(!animOn) return
  const elapsed = ts - animStart
  let idx = scTimings.length-1, prog=1
  for(let i=0;i<scTimings.length;i++){
    if(elapsed>=scTimings[i].s&&elapsed<scTimings[i].e){
      idx=i; prog=(elapsed-scTimings[i].s)/(scTimings[i].e-scTimings[i].s); break
    }
  }
  if(idx!==curScIdx){
    highlightScene(idx)
    if(idx===ep.scenes.length-1) initConfetti()
  }
  drawScene(idx, Math.min(prog,1), ts)
  if(elapsed>=scTimings[scTimings.length-1].e){
    animOn=false
    if(mrec&&mrec.state==='recording') setTimeout(()=>mrec.stop(),300)
    return
  }
  rafId=requestAnimationFrame(animLoop)
}

// ═══════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════
function initVoices(){
  return new Promise(resolve=>{
    const tryLoad=()=>{
      const all=speechSynthesis.getVoices(); if(!all.length) return false
      const he=all.filter(v=>v.lang.startsWith('he'))
      childVoice=bearVoice=(he.length?he[0]:all[0]); voicesOk=!!he.length; resolve(voicesOk); return true
    }
    if(!tryLoad()){speechSynthesis.onvoiceschanged=()=>tryLoad(); setTimeout(()=>resolve(false),2500)}
  })
}

async function speakLine(line, isChild){
  return new Promise(resolve=>{
    const u=new SpeechSynthesisUtterance(line)
    u.lang='he-IL'; u.voice=isChild?childVoice:bearVoice
    u.pitch=isChild?1.35:0.78; u.rate=0.80; u.volume=1
    u.onend=resolve; u.onerror=resolve
    speechSynthesis.speak(u)
  })
}

async function speakScene(scene){
  const isChild=scene.speakerType==='child'
  for(const line of(scene.lines||[])){
    if(playMode!=='preview') return
    await speakLine(line, isChild)
    await sleep(300)
  }
}

// ═══════════════════════════════════════════
// MUSIC
// ═══════════════════════════════════════════
const MELODY=[262,294,330,294,262,294,330,392, 440,392,330,294,330,392,440,524]
const NOTE_DUR=0.30

function startMusic(dest){
  let t=audioCtx.currentTime+0.05, ni=0
  function sched(){
    while(t<audioCtx.currentTime+1.5){
      const freq=MELODY[ni%MELODY.length]
      const osc=audioCtx.createOscillator(), g=audioCtx.createGain()
      osc.type='sine'; osc.frequency.value=freq
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.045,t+0.025)
      g.gain.linearRampToValueAtTime(0.032,t+NOTE_DUR*0.6); g.gain.linearRampToValueAtTime(0,t+NOTE_DUR-0.02)
      osc.connect(g); g.connect(audioCtx.destination); if(dest) g.connect(dest)
      osc.start(t); osc.stop(t+NOTE_DUR); t+=NOTE_DUR; ni++
    }
  }
  sched(); musicHandle=setInterval(sched,250)
}

function stopMusic(){if(musicHandle){clearInterval(musicHandle);musicHandle=null}}

// ═══════════════════════════════════════════
// GENERATE VIDEO
// ═══════════════════════════════════════════
async function generateVideo(){
  if(!ep) return
  buildScriptPanel(); buildTimings(); curScIdx=-1; confettiParticles=[]
  go('s-record'); playMode='recording'

  document.getElementById('recStatus').textContent='מייצר סרטון...'
  document.getElementById('genProgress').style.display='block'
  document.getElementById('genBar').style.width='0%'
  document.getElementById('genLabel').textContent='מאתחל...'
  document.getElementById('cancelBtn').style.display='flex'

  await sleep(600)

  audioCtx=new AudioContext(); recordDest=audioCtx.createMediaStreamDestination()
  startMusic(recordDest)

  const cvStream=cv.captureStream(30)
  const combined=new MediaStream([...cvStream.getVideoTracks(),...recordDest.stream.getAudioTracks()])
  chunks=[]
  const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm'
  mrec=new MediaRecorder(combined,{mimeType:mime})
  mrec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)}
  mrec.onstop=finishRec
  mrec.start(100)

  const totalMs=ep.scenes.reduce((s,x)=>s+x.duration,0)*1000
  const genStart=performance.now()
  const progTimer=setInterval(()=>{
    const elapsed=performance.now()-genStart
    const pct=Math.min(96,(elapsed/totalMs)*100)
    const rem=Math.max(0,Math.ceil((totalMs-elapsed)/1000))
    document.getElementById('genBar').style.width=pct+'%'
    document.getElementById('genLabel').textContent=`מייצר... ${rem} שניות נותרו`
  },400)

  animOn=true; animStart=performance.now()
  rafId=requestAnimationFrame(animLoop)

  await new Promise(resolve=>{const chk=setInterval(()=>{if(!animOn){clearInterval(chk);resolve()}},200)})
  clearInterval(progTimer)
  document.getElementById('genBar').style.width='100%'
  document.getElementById('genLabel').textContent='שומר...'
}

function finishRec(){
  playMode=''
  if(audioCtx){audioCtx.close().catch(()=>{});audioCtx=null}
  document.getElementById('rdot').className='rdot'
  document.getElementById('genProgress').style.display='none'
  document.getElementById('cancelBtn').style.display='none'
  const blob=new Blob(chunks,{type:'video/webm'})
  const url=URL.createObjectURL(blob)
  document.getElementById('vidPrev').src=url
  document.getElementById('dlBtn').onclick=()=>{
    const a=document.createElement('a'); a.href=url; a.download='kesem_'+Date.now()+'.webm'; a.click()
  }
  go('s-done')
}

// ═══════════════════════════════════════════
// PREVIEW MODE (TTS)
// ═══════════════════════════════════════════
async function startPreview(){
  if(!ep) return
  buildScriptPanel(); curScIdx=-1; confettiParticles=[]
  go('s-record'); playMode='preview'
  document.getElementById('recStatus').textContent='מנגן תצוגה מקדימה...'
  document.getElementById('cancelBtn').style.display='flex'
  audioCtx=new AudioContext(); startMusic(null)
  await initVoices()
  for(let i=0;i<ep.scenes.length;i++){
    if(playMode!=='preview') break
    const scene=ep.scenes[i]
    highlightScene(i)
    if(i===ep.scenes.length-1) initConfetti()
    const scStart=performance.now(), scDur=scene.duration*1000
    let drawDone=false
    const drawFn=()=>{
      if(drawDone||playMode!=='preview') return
      drawScene(i, Math.min((performance.now()-scStart)/scDur,1), performance.now())
      rafId=requestAnimationFrame(drawFn)
    }
    rafId=requestAnimationFrame(drawFn)
    if(voicesOk) await speakScene(scene)
    else await sleep(scDur)
    drawDone=true; cancelAnimationFrame(rafId)
    await sleep(180)
  }
  if(playMode==='preview'){
    playMode=''; stopMusic()
    if(audioCtx){audioCtx.close().catch(()=>{});audioCtx=null}
    document.getElementById('recStatus').textContent='הסתיים!'
    document.getElementById('cancelBtn').style.display='none'
  }
}

function onCancel(){
  cleanup()
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById('s-script').classList.add('active')
  if(ep) renderScript()
  window.scrollTo(0,0)
}
