name: Chadshani — Deploy Only
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: chadshani-update
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write design version timestamp
        run: |
          echo '{"design_updated":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > "Shalev's_Projects/1_chadshani/version.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Shalev's_Projects/1_chadshani"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify iPhone — design updated
        if: success()
        run: |
          DEPLOY_TIME=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M')
          curl -s -X POST https://ntfy.sh/CHA0511 \
            -H "Title: חדשני — עיצוב עודכן ✅" \
            -H "Priority: default" \
            -H "Tags: art" \
            -d "האתר עודכן בהצלחה — ${DEPLOY_TIME} IL"
