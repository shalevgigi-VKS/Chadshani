name: Chadshani — Deploy Only (DISABLED — replaced by chadshani-update.yml)
on:
  workflow_dispatch:
  # push trigger removed 2026-04-05 — chadshani-update.yml handles generate+deploy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: chadshani-update
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write design version timestamp
        run: |
          echo '{"design_updated":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > "Shalev's_Projects/2_Chadshani/version.json"

      - name: Inject data + meta into index.html
        run: |
          python3 - <<'EOF'
          import json, re, os
          latest = "Shalev's_Projects/2_Chadshani/data/latest.json"
          if not os.path.exists(latest):
              print("[META] no latest.json, skipping")
              exit(0)
          with open(latest, encoding="utf-8") as f:
              raw = f.read()
              data = json.loads(raw)
          headline = data.get("section_1_situation", {}).get("headline", "")
          if not headline:
              print("[META] no headline, skipping")
              exit(0)
          # OG/Twitter meta (social sharing) — use headline
          desc = headline[:200]
          og_title = f"חדשני v4.0 | {headline[:80]}"
          with open("Shalev's_Projects/2_Chadshani/index.html", encoding="utf-8") as f:
              html = f.read()
          # Inject OG/Twitter meta only — do NOT touch <title> (keep "חדשני v4.0")
          html = re.sub(r'(<meta property="og:description" content=")[^"]*(")', f'\\g<1>{desc}\\2', html)
          html = re.sub(r'(<meta property="og:title" content=")[^"]*(")', f'\\g<1>{og_title}\\2', html)
          html = re.sub(r'(<meta name="twitter:title" content=")[^"]*(")', f'\\g<1>{og_title}\\2', html)
          html = re.sub(r'(<meta name="twitter:description" content=")[^"]*(")', f'\\g<1>{desc}\\2', html)
          # Inject fresh window.__INLINE_DATA__ so page shows current data immediately
          json_compact = json.dumps(data, ensure_ascii=False, separators=(',', ':'))
          html = re.sub(
              r'window\.__INLINE_DATA__\s*=\s*(?:\{.*?\}|null)\s*;',
              f'window.__INLINE_DATA__={json_compact};',
              html,
              flags=re.DOTALL
          )
          with open("Shalev's_Projects/2_Chadshani/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print(f"[META] injected: {og_title[:60]}")
          print(f"[DATA] window.__INLINE_DATA__ updated: {data.get('generated_at')}")
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Shalev's_Projects/2_Chadshani"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
