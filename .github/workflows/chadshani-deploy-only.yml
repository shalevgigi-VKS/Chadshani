name: Chadshani — Deploy Only
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: chadshani-update
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write design version timestamp
        run: |
          echo '{"design_updated":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > "Shalev's_Projects/2_Chadshani/version.json"

      - name: Inject dynamic meta into index.html
        run: |
          python3 - <<'EOF'
          import json, re, os
          latest = "Shalev's_Projects/2_Chadshani/data/latest.json"
          if not os.path.exists(latest):
              print("[META] no latest.json, skipping")
              exit(0)
          with open(latest, encoding="utf-8") as f:
              data = json.load(f)
          headline = data.get("section_1_situation", {}).get("headline", "")
          if not headline:
              print("[META] no headline, skipping")
              exit(0)
          desc = headline[:200]
          title = f"חדשני | {headline[:80]}"
          with open("Shalev's_Projects/2_Chadshani/index.html", encoding="utf-8") as f:
              html = f.read()
          html = re.sub(r'(<meta property="og:description" content=")[^"]*(")', f'\\g<1>{desc}\\2', html)
          html = re.sub(r'(<meta property="og:title" content=")[^"]*(")', f'\\g<1>{title}\\2', html)
          html = re.sub(r'(<meta name="twitter:title" content=")[^"]*(")', f'\\g<1>{title}\\2', html)
          html = re.sub(r'(<title>)[^<]*(</title>)', f'\\g<1>{title}\\2', html)
          with open("Shalev's_Projects/2_Chadshani/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print(f"[META] injected: {title[:60]}")
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Shalev's_Projects/2_Chadshani"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify iPhone — design updated
        if: success()
        run: |
          DEPLOY_TIME=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M')
          curl -s -X POST https://ntfy.sh/CHA0511 \
            -H "Title: חדשני — עיצוב עודכן ✅" \
            -H "Priority: default" \
            -H "Tags: art" \
            -d "האתר עודכן בהצלחה — ${DEPLOY_TIME} IL"
