name: Innovation Scout — Claude Code Ecosystem Monitor

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:         # Manual trigger

permissions:
  contents: read

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Run Innovation Scout
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC_SCOUT || 'CHA0511' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/innovation_scout.py
