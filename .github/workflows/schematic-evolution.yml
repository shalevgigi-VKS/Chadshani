name: Schematic Evolution — Notify & Deploy

on:
  push:
    paths:
      - "Shalev's_Projects/0_EvolutionSchematic/data/snapshot.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send update to iPhone via ntfy.sh
        run: |
          NOW=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M IL')
          curl -s -X POST https://ntfy.sh/CloudeCode \
            -H "Title: אבולוציה סכמטית — מפת מערכת עודכנה 🧠" \
            -H "Priority: default" \
            -H "Tags: brain,sparkles" \
            -H "Click: https://shalevgigi-vks.github.io/Claude-Schematic/" \
            -d "מפת המערכת השבועית עודכנה — $NOW"

  deploy:
    needs: notify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload schematic site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Shalev's_Projects/0_EvolutionSchematic"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
