name: Chadshani 2.0 — Daily Auto-Update

on:
  schedule:
    - cron: '0 4 * * *'    # 07:00 Israel (UTC+3 summer)
    - cron: '0 10 * * *'   # 13:00 Israel (UTC+3 summer)
    - cron: '0 15 * * *'   # 18:00 Israel (UTC+3 summer)
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet google-genai yfinance

      - name: Generate latest.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd "Shalev's_Projects/1_chadshani"
          python generate_json.py

      - name: Commit and push JSON
        run: |
          git config user.name  "Chadshani Bot"
          git config user.email "chadshani@users.noreply.github.com"
          git add "Shalev's_Projects/1_chadshani/data/latest.json"
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "update $(date -u +'%Y-%m-%d %H:%M')"
            git pull --rebase origin master
            git push
          )

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Shalev's_Projects/1_chadshani"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          TIME=$(TZ=Asia/Jerusalem date +'%H:%M')
          URL="https://shalevgigi-vks.github.io/Chadshani/"
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="✅ חדשני מוכן לצפייה נכון לשעה: ${TIME}"$'\n'"🔗 ${URL}"
          else
            MSG="⚠️ חדשני — עדכון נכשל בשעה ${TIME}"
          fi
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" || echo "CURL_FAILED")
          echo "Telegram response: ${RESPONSE}"
