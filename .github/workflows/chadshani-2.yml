name: Chadshani — Auto Update (DATA+DEPLOY)
# SCHEDULE ONLY — uses Gemini API
# For HTML/design changes only: use "Chadshani — Deploy Only" workflow

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'    # 07:00 Israel (UTC+3)
    - cron: '0 10 * * *'   # 13:00 Israel (UTC+3)
    - cron: '0 17 * * *'   # 20:00 Israel (UTC+3)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: chadshani-update
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet google-genai yfinance

      - name: Generate latest.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd "Shalev's_Projects/1_chadshani"
          python generate_json.py

      - name: Commit data files
        run: |
          git config user.name  "Chadshani Bot"
          git config user.email "chadshani@users.noreply.github.com"
          git add "Shalev's_Projects/1_chadshani/data/"
          git diff --staged --quiet && echo "[skip] No data changes" || \
            git commit -m "update $(TZ=Asia/Jerusalem date +'%Y-%m-%d %H:%M IL')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Shalev's_Projects/1_chadshani"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify success
        run: |
          NOW=$(TZ=Asia/Jerusalem date +'%H:%M IL')
          curl -s -X POST https://ntfy.sh/CHA0511 \
            -H "Title: Chadshani Updated" \
            -H "Tags: white_check_mark" \
            -d "האתר עודכן בהצלחה — $NOW"

      - name: Notify failure
        if: failure()
        run: |
          NOW=$(TZ=Asia/Jerusalem date +'%H:%M IL')
          curl -s -X POST https://ntfy.sh/CHA0511 \
            -H "Title: Chadshani FAILED" \
            -H "Tags: x" \
            -H "Priority: high" \
            -d "עדכון נכשל — $NOW — בדוק GitHub Actions"
