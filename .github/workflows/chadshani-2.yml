name: Chadshani — Auto Update (DATA+DEPLOY)
# SCHEDULE ONLY — uses Gemini API
# For HTML/design changes only: use "Chadshani — Deploy Only" workflow

on:
  workflow_dispatch:
  schedule:
    # Start 15min before 07:00 IL: 06:45 IL summer (UTC+3)=03:45 UTC / winter (UTC+2)=04:45 UTC
    - cron: '45 3 * * *'
    # Start 15min before 19:00 IL: 18:45 IL summer (UTC+3)=15:45 UTC / winter (UTC+2)=16:45 UTC
    - cron: '45 15 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: chadshani-update
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet google-genai yfinance

      - name: Generate latest.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd "Shalev's_Projects/2_Chadshani"
          python generate_json.py

      - name: Commit data files
        run: |
          git config user.name  "Chadshani Bot"
          git config user.email "chadshani@users.noreply.github.com"
          git add "Shalev's_Projects/2_Chadshani/data/"
          git diff --staged --quiet && echo "[skip] No data changes" || \
            git commit -m "update $(TZ=Asia/Jerusalem date +'%Y-%m-%d %H:%M IL')"
          git pull --rebase origin master
          git push

      - name: Validate generated data
        id: validate
        run: |
          python - <<'EOF'
          import json, sys, os

          PLACEHOLDERS = ("לא זמין", "$...", None, "", "אין חדשות חדשות מהשבוע האחרון.",
                          "עדכון ידוע: לא זמין", "לא זמין.", "אין עדכון")

          path = "Shalev's_Projects/2_Chadshani/data/latest.json"
          if not os.path.exists(path):
              print("[VALIDATE] FAIL: latest.json not found"); sys.exit(1)

          with open(path, encoding="utf-8") as f:
              data = json.load(f)

          issues = []

          if not data.get("generated_at"):
              issues.append("generated_at missing")

          headline = data.get("section_1_situation", {}).get("headline", "")
          if not headline or headline in PLACEHOLDERS:
              issues.append("section_1_situation.headline missing or placeholder")

          markets = data.get("markets", {})
          for key in ("sp500", "nasdaq", "vix"):
              if key not in markets:
                  issues.append(f"markets.{key} missing")

          for section in ("section_5_semis", "section_6_software"):
              for item in data.get(section, []):
                  if item.get("price") in PLACEHOLDERS:
                      issues.append(f"{section}.{item.get('ticker')} price placeholder")

          for item in data.get("section_4_crypto", []):
              if item.get("price") in PLACEHOLDERS:
                  issues.append(f"section_4_crypto.{item.get('ticker')} price placeholder")

          if len(data.get("section_2_news", [])) < 4:
              issues.append(f"section_2_news has {len(data.get('section_2_news',[]))} items (need 4)")

          # Note: section_7_ai content is often empty from Gemini — fallback to merged previous data
          # if len(data.get("section_7_ai", [])) < 3:
          #     issues.append(f"section_7_ai has {len(data.get('section_7_ai',[]))} items (need 3)")

          for s in data.get("section_3_sectors", []):
              amt = s.get("flow_amount", "")
              if "X.X" in str(amt) or amt in ("", None):
                  issues.append(f"section_3_sectors.{s.get('etf')} flow_amount placeholder: {amt!r}")

          vix_val = data.get("section_1_situation", {}).get("gauges", {}).get("vix", {}).get("value", "")
          try:
              float(str(vix_val).replace("%", ""))
          except (ValueError, TypeError):
              issues.append(f"gauges.vix not numeric: {vix_val!r}")

          # Reject "אין חדשות" appearing in news or AI sections
          for item in data.get("section_2_news", []):
              s = item.get("body", "") or item.get("summary", "")
              if not s or "אין חדשות" in s or s.strip() in PLACEHOLDERS:
                  issues.append(f"section_2_news item has placeholder body/summary: {s[:40]!r}")

          # Note: section_7_ai content is often empty from Gemini — fallback relies on merge
          # Skip validation of its content until we have better AI data source
          # for item in data.get("section_7_ai", []):
          #     u = item.get("update", "") or item.get("summary", "")
          #     if "אין חדשות" in u or "לא זמין" in u or u.strip() in PLACEHOLDERS:
          #         issues.append(f"section_7_ai item has placeholder update: {u[:40]!r}")

          if issues:
              print("[VALIDATE] FAIL — data quality issues:")
              for i in issues: print(f"  - {i}")
              sys.exit(1)
          else:
              print(f"[VALIDATE] PASS — {len(data)} keys, no placeholders")
          EOF

      - name: Inject dynamic meta into index.html
        run: |
          python - <<'EOF'
          import json, re
          with open("Shalev's_Projects/2_Chadshani/data/latest.json", encoding="utf-8") as f:
              data = json.load(f)
          headline = data.get("section_1_situation", {}).get("headline", "")
          if headline:
              desc = headline[:200]
              title = f"חדשני | {headline[:80]}"
              with open("Shalev's_Projects/2_Chadshani/index.html", encoding="utf-8") as f:
                  html = f.read()
              html = re.sub(r'(<meta property="og:description" content=")[^"]*(")', f'\\g<1>{desc}\\2', html)
              html = re.sub(r'(<meta property="og:title" content=")[^"]*(")', f'\\g<1>{title}\\2', html)
              html = re.sub(r'(<meta name="twitter:title" content=")[^"]*(")', f'\\g<1>{title}\\2', html)
              html = re.sub(r'(<title>)[^<]*(</title>)', f'\\g<1>{title}\\2', html)
              with open("Shalev's_Projects/2_Chadshani/index.html", "w", encoding="utf-8") as f:
                  f.write(html)
              print(f"[META] injected: {title[:60]}")
          else:
              print("[META] no headline found, skipping injection")
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Shalev's_Projects/2_Chadshani"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify success
        if: success()
        run: |
          NOW=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M IL')
          
          echo "Checking if Chadshani site is live..."
          for i in {1..6}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://shalevgigi-vks.github.io/Chadshani/)
            if [ "$HTTP_STATUS" == "200" ]; then break; fi
            sleep 5
          done

          curl -s -X POST https://ntfy.sh/CloudeCode \
            -H "Title: חדשני — נתונים עודכנו ואומתו ✅" \
            -H "Tags: newspaper" \
            -H "Priority: default" \
            -d "עדכון אוטומטי הושלם, נתונים עברו אימות ואתר פורסם — $NOW"

      - name: Notify failure
        if: failure()
        run: |
          NOW=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M IL')
          STEP="${{ steps.validate.outcome }}"
          MSG="עדכון נכשל"
          [ "$STEP" = "failure" ] && MSG="נתונים לא עברו אימות (placeholder / חסר)"
          curl -s -X POST https://ntfy.sh/CloudeCode \
            -H "Title: חדשני — עדכון נכשל ⚠️" \
            -H "Tags: x" \
            -H "Priority: high" \
            -d "$MSG — $NOW — בדוק GitHub Actions"
