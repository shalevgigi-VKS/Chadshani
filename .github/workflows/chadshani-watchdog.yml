name: Chadshani — Watchdog

on:
  schedule:
    - cron: '20 4 * * *'   # 07:20 Israel — checks 07:00 run
    - cron: '20 10 * * *'  # 13:20 Israel — checks 13:00 run
    - cron: '20 17 * * *'  # 20:20 Israel — checks 20:00 run
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check last auto-update run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the most recent run of the main update workflow
          LAST_RUN=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow chadshani-2.yml \
            --limit 1 \
            --json status,conclusion,createdAt \
            --jq '.[0]')

          STATUS=$(echo "$LAST_RUN" | jq -r '.status')
          CONCLUSION=$(echo "$LAST_RUN" | jq -r '.conclusion')
          CREATED=$(echo "$LAST_RUN" | jq -r '.createdAt')

          echo "Last run: status=$STATUS conclusion=$CONCLUSION created=$CREATED"

          # If the run is currently in_progress — it's fine, nothing to do
          if [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ] || [ "$STATUS" = "waiting" ]; then
            STARTED_TS=$(date -d "$CREATED" +%s 2>/dev/null || echo 0)
            NOW_TS=$(date +%s)
            RUNNING_MIN=$(( (NOW_TS - STARTED_TS) / 60 ))
            if [ "$RUNNING_MIN" -lt 20 ]; then
              echo "✅ Run is currently $STATUS (started ${RUNNING_MIN}m ago) — all good"
              exit 0
            fi
            echo "⚠️ Run has been $STATUS for ${RUNNING_MIN}m — may be stuck"
          fi

          # Check if last run was within the last 90 minutes and succeeded
          LAST_TS=$(date -d "$CREATED" +%s 2>/dev/null || echo 0)
          NOW_TS=$(date +%s)
          DIFF=$(( (NOW_TS - LAST_TS) / 60 ))

          echo "Minutes since last run started: $DIFF"

          NEED_ALERT=false
          if [ "$CONCLUSION" = "failure" ]; then
            NEED_ALERT=true
            NOW_IL=$(TZ=Asia/Jerusalem date +'%H:%M IL')
            MSG="❌ עדכון נכשל — בדוק GitHub Actions ($NOW_IL)"
          elif [ "$DIFF" -gt 90 ] && [ "$STATUS" != "in_progress" ] && [ "$STATUS" != "queued" ]; then
            NEED_ALERT=true
            NOW_IL=$(TZ=Asia/Jerusalem date +'%H:%M IL')
            MSG="⚠️ עדכון לא רץ כבר ${DIFF} דקות — בדוק GitHub Actions ($NOW_IL)"
          fi

          if [ "$NEED_ALERT" = "true" ]; then
            # Auto-retry the main workflow
            echo "Triggering auto-retry of chadshani-2.yml..."
            gh workflow run chadshani-2.yml \
              --repo ${{ github.repository }} \
              --ref master && RETRY_STATUS="✅ הפעלה חוזרת הושקה" || RETRY_STATUS="❌ הפעלה חוזרת נכשלה — טעון טיפול ידני"

            curl -s -X POST https://ntfy.sh/CHA0511 \
              -H "Title: Chadshani — טעון טיפול" \
              -H "Tags: warning" \
              -H "Priority: high" \
              -d "$MSG | $RETRY_STATUS"

            echo "ALERT SENT: $MSG | $RETRY_STATUS"
            exit 1
          fi

          echo "✅ Last run was $CONCLUSION ($DIFF min ago) — all good"
