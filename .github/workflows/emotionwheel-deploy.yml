name: EmotionWheel Deploy
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to Emotion-Whell repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/shalevgigi-VKS/Emotion-Whell.git /tmp/ew
          rsync -av --exclude="project_index.md" --exclude="README.md" "Shalev's_Projects/000_EmotionWheel/" /tmp/ew/
          cd /tmp/ew
          git config user.name "EmotionWheel Bot"
          git config user.email "bot@noreply"
          git add -A
          git diff --staged --quiet || git commit -m "update $(date +%F)"
          git push

      - name: Notify
        if: always()
        run: |
          curl -s -X POST https://ntfy.sh/CLA0511             -H "Title: EmotionWheel deploy ${{ job.status }}"             -d "Deploy ${{ job.status }}"
