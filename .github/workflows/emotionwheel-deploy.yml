name: EmotionWheel Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - "Shalev's_Projects/000_EmotionWheel/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to Emotion-Whell repo
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/shalevgigi-VKS/Emotion-Whell.git /tmp/emotion-whell
          cp -r "Shalev's_Projects/000_EmotionWheel/." /tmp/emotion-whell/
          rm -f /tmp/emotion-whell/project_index.md
          cd /tmp/emotion-whell
          git config user.name "EmotionWheel Bot"
          git config user.email "emotionwheel@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "[skip] No changes" || git commit -m "update $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Notify success
        if: success()
        run: |
          python3 -c "
import json,urllib.request
d=json.dumps({'topic':'CLA0511','title':'גלגל הרגשות עודכן','message':'האתר פורסם בהצלחה','priority':3,'tags':['white_check_mark']}).encode('utf-8')
urllib.request.urlopen(urllib.request.Request('https://ntfy.sh',d,{'Content-Type':'application/json; charset=utf-8'}))
"

      - name: Notify failure
        if: failure()
        run: |
          python3 -c "
import json,urllib.request
d=json.dumps({'topic':'CLA0511','title':'גלגל הרגשות נכשל','message':'פרסום נכשל — בדוק GitHub Actions','priority':4,'tags':['x']}).encode('utf-8')
urllib.request.urlopen(urllib.request.Request('https://ntfy.sh',d,{'Content-Type':'application/json; charset=utf-8'}))
"
