<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חדשני — מעדכן החדשות</title>

  <!-- Google Fonts — Heebo (Hebrew-optimised) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════ HEADER ════════════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">

      <!-- Logo -->
      <a class="logo" href="#">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">
          <div class="logo-title">חדשני</div>
          <div class="logo-sub">מעדכן החדשות</div>
        </div>
      </a>

      <!-- Live clock + Hebrew date -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:.15rem">
        <span class="live-clock" id="live-clock">00:00:00</span>
        <span class="live-date"  id="live-date"></span>
      </div>

      <!-- Last updated badge (set by script.js from embedded JSON or Looker) -->
      <span class="ts-badge" id="ts-badge">טוען...</span>

      <button class="btn-export" onclick="exportAll()">ייצא הכל ✂</button>
    </div>
  </header>

  <!-- ══════════════ PAGE WRAPPER ══════════════════════════ -->
  <div class="page-wrapper">

    <!-- ── Carousel section ──────────────────────────────── -->
    <section class="carousel-section" aria-label="תמונות הסבר תהליך">
      <div class="carousel-wrapper">

        <!-- Slides are injected by script.js into this track -->
        <div class="carousel-track" role="region" aria-live="polite"></div>

        <!-- Navigation arrows (RTL: prev = right side, next = left side) -->
        <button class="carousel-btn prev" aria-label="תמונה קודמת">&#8250;</button>
        <button class="carousel-btn next" aria-label="תמונה הבאה">&#8249;</button>

        <!-- Indicator dots -->
        <div class="carousel-dots" role="tablist" aria-label="בחירת תמונה"></div>

      </div>
    </section>

    <!-- ── Looker Studio widget ───────────────────────────── -->
    <section class="looker-section" aria-label="נתוני שוק בזמן אמת">
      <div class="looker-card">
        <div class="looker-header">
          <div class="looker-icon">📊</div>
          <div>
            <div class="looker-title">נתוני שוק — Looker Studio</div>
            <div class="looker-subtitle" id="looker-updated">טוען נתונים...</div>
          </div>
          <button class="btn-refresh" id="btn-refresh-looker" aria-label="רענן נתונים">רענן ↺</button>
        </div>
        <!-- Looker body: skeleton → data cards / error card -->
        <div class="looker-body" id="looker-body">
          <!-- Populated by fetchLookerData() in script.js -->
        </div>
      </div>
    </section>

    <!-- ── Two-column layout: Sidebar + Main ─────────────── -->
    <div class="page-layout">

      <!-- Sidebar navigation (scroll spy) -->
      <nav class="sidebar" aria-label="ניווט סעיפים">
        <div class="sidebar-inner" id="sidebar-inner">
          <div class="sidebar-title">ניווט מהיר</div>
          <!-- Nav items injected by buildNav() in script.js -->
        </div>
      </nav>

      <!-- Main content area -->
      <main>

        <!-- Empty / loading state (hidden once data loads) -->
        <div class="empty-state" id="empty-state">
          <div class="big-icon">📡</div>
          <h2>טוען דסק חדשות...</h2>
          <p>הנתונים יופיעו בקרוב</p>
        </div>

        <!-- News cards (shown once data is parsed) -->
        <div id="news-cols" style="display:none">
          <div class="col-main" id="col-main">
            <!-- Section cards injected by initNewsCards() in script.js -->
          </div>
        </div>

      </main>
    </div><!-- /.page-layout -->

  </div><!-- /.page-wrapper -->

  <!-- ══════════════ FOOTER ════════════════════════════════ -->
  <footer class="site-footer">
    <span class="pulse-dot"></span>
    חדשני — מעדכן חדשות מודיעיני אוטונומי | מופעל על-ידי Gemini AI + Google Search
  </footer>

  <!-- Toast notification (copy / export feedback) -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ══════════════ EMBEDDED DATA (injected by generate_website.py) ══ -->
  <!--
    generate_website.py replaces the PLACEHOLDER tokens below
    with real JSON before deploying to GitHub Pages.
    Do NOT edit the data- attribute or the JSON content manually.
  -->
  <script id="news-data" type="application/json" data-updated="15.03.2026 11:07">
[]
  </script>

  <script id="gauges-data" type="application/json">
{}
  </script>

  <!-- ══════════════ APP SCRIPT ═════════════════════════════ -->
  <script src="script.js"></script>

</body>
</html>
